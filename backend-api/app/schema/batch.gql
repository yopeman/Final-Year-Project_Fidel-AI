enum BatchLevel {
  BEGINNER
  BASIC
  INTERMEDIATE
  ADVANCED
}

enum BatchStatus {
  UPCOMING
  ACTIVE
  COMPLETED
  CANCELLED
}

type Batch {
  id: ID!
  name: String!
  description: String
  level: BatchLevel!
  language: String!
  startDate: Date!
  endDate: Date
  maxStudents: Int!
  status: BatchStatus!
  feeAmount: Float!
  createdAt: DateTime!
  updatedAt: DateTime!
  isDeleted: Boolean!
  deletedAt: DateTime
  # Relationships
  batchCourses: [BatchCourse!]!
  enrollments: [BatchEnrollment!]!
  communities: [BatchCommunity!]!
  instructors: [BatchInstructor!]!
}


extend type Query {
  batches: [Batch!]!
  batch(id: ID!): Batch
  myBatches: [Batch!]!
}

extend type Mutation {
  createBatch(input: CreateBatchInput!): Batch!
  updateBatch(id: ID!, input: UpdateBatchInput!): Batch!
  deleteBatch(id: ID!): Boolean!
}


input CreateBatchInput {
  name: String!
  description: String
  level: BatchLevel!
  language: String! = "English"
  startDate: Date!
  endDate: Date
  maxStudents: Int!
  feeAmount: Float!
}

input UpdateBatchInput {
  name: String
  description: String
  level: BatchLevel
  language: String
  startDate: Date
  endDate: Date
  maxStudents: Int
  feeAmount: Float
  status: BatchStatus
}
