enum PaymentStatus {
  PENDING
  COMPLETED
  FAILED
  CANCELED
}

type Payment {
  id: ID!
  enrollmentId: ID!
  amount: Float!
  currency: String!
  method: String
  status: PaymentStatus!
  paidAt: DateTime
  transactionId: String
  checkoutUrl: String
  receiptUrl: String
  createdAt: DateTime!
  updatedAt: DateTime!
  isDeleted: Boolean!
  deletedAt: DateTime
  
  # Step 4 Workflow Alignment Fields
  isSuccess: Boolean
  subscriptionActive: Boolean
  subscriptionPlan: String
  subscriptionStartDate: DateTime
  subscriptionEndDate: DateTime

  # Relationships
  enrollment: BatchEnrollment!
}

extend type Query {
  payments(enrollmentId: ID, status: PaymentStatus): [Payment!]!
  payment(id: ID!): Payment!
}

extend type Mutation {
  makePayment(enrollmentId: ID!): Payment!
  verifyPayment(enrollmentId: ID!): Payment!
  cancelPayment(id: ID!): Payment!
  deletePayment(id: ID!): Boolean!
}
