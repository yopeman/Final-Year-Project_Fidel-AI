<!DOCTYPE html>
<html>
    <head>
        <title>Certificate Not Found</title>
        <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
        <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f8fafc 0%, #e0e7ef 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto', Arial, sans-serif;
        }
        .container {
            background: #fff;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            border-radius: 18px;
            padding: 2.5rem 2rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .title {
            color: #e53e3e;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            letter-spacing: 0.02em;
        }
        .message {
            color: #4a5568;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }
        .icon {
            font-size: 3rem;
            color: #e53e3e;
            margin-bottom: 1rem;
        }
        </style>
    </head>
    <body>
        <div class="container">
        <div class="icon">🚫</div>
        <div class="title">Certificate Not Found</div>
        <div class="message">Sorry, we couldn't find the certificate <br> you are looking for.</div>
        </div>
    </body>
</html>
