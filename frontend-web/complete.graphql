  schedules: [Schedule!]!
  schedule(id: ID!): Schedule
}

extend type Mutation {
  createSchedule(input: CreateScheduleInput!): Schedule!
  updateSchedule(id: ID!, input: UpdateScheduleInput!): Schedule!
  deleteSchedule(id: ID!): Boolean!
}


input CreateScheduleInput {
  dayOfWeek: DayOfWeek!
  startTime: Time!
  endTime: Time!
}

input UpdateScheduleInput {
  dayOfWeek: DayOfWeek
  startTime: Time
  endTime: Time
}


enum QuizType {
  MATCHING
  TRUE_FALSE
  FILLING_THE_GAP
}

type Quiz {
  id: ID!
  batchCourseId: ID!
  question: String!
  answer: String!
  type: QuizType!
  createdAt: DateTime!
  updatedAt: DateTime!
  isDeleted: Boolean!
  deletedAt: DateTime
  # Relationships
  batchCourse: BatchCourse!
  results: [QuizResults!]!
}


type FreeConversation {
  id: ID!
  profileId: ID!
  startingTopic: String!
  topicSummaryPhrase: String
  createdAt: DateTime!
  updatedAt: DateTime!
  isDeleted: Boolean!
  deletedAt: DateTime
  # Relationships
  profile: StudentProfile!
  interactions: [ConversationInteractions!]!
}

extend type Query {
  freeConversations(profileId: ID!): [FreeConversation!]!
  freeConversation(id: ID!): FreeConversation
}

extend type Mutation {
  createConversation(startingTopic: String!): FreeConversation!
  generateIdea: String!
  deleteConversation(id: ID!): Boolean!
}


enum InstructorRole {
  MAIN
  ASSISTANT
}

type BatchInstructor {
  id: ID!
  userId: ID!
  batchCourseId: ID!
  role: InstructorRole!
  createdAt: DateTime!
  updatedAt: DateTime!
  isDeleted: Boolean!
  deletedAt: DateTime
  # Relationships
  user: User!
  batchCourse: BatchCourse!
}


input CreateBatchInstructorInput {
  userId: ID!
  batchCourseId: ID!
  role: InstructorRole!
}

input UpdateBatchInstructorInput {
  userId: ID
  batchCourseId: ID
  role: InstructorRole
}

extend type Query {
  instructors(batchId: ID): [BatchInstructor!]!
  instructor(id: ID!): BatchInstructor
}

extend type Mutation {
  createInstructor(input: CreateBatchInstructorInput!): BatchInstructor!
  updateInstructor(id: ID!, input: UpdateBatchInstructorInput!): BatchInstructor!
  deleteInstructor(id: ID!): Boolean!
}


input UpdateArticleInput {
  title: String
  faviconUrl: String
  description: String
  pageUrl: String
}

type LessonOnlineArticles {
  id: ID!
  lessonId: ID!
  title: String!
  faviconUrl: String
  description: String
  pageUrl: String!
  createdAt: DateTime!
  updatedAt: DateTime!
  isDeleted: Boolean!
  deletedAt: DateTime
  # Relationships
  lesson: ModuleLessons!
}

extend type Query {
  articles(lessonId: ID!): [LessonOnlineArticles!]!
  article(id: ID!): LessonOnlineArticles!
}

extend type Mutation {
  updateArticle(id: ID!, input: UpdateArticleInput!): LessonOnlineArticles!
  deleteArticle(id: ID!): Boolean!
}