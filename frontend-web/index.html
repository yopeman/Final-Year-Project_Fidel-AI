<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fidel AI - English Learning Platform</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                DEFAULT: '#FFC107',
                50: '#fffdf0',
                100: '#fff7cc',
                200: '#ffeb99',
                300: '#ffdf66',
                400: '#ffd333',
                500: '#FFC107',
                600: '#ffb300',
                700: '#e6a100',
                800: '#cc8f00',
                900: '#b37d00',
              },
              brand: {
                green: '#10B981',
                indigo: '#6366F1',
                yellow: '#FFC107',
                yellowGlow: 'rgba(255, 193, 7, 0.2)',
              },
              accent: {
                secondary: 'rgba(255, 255, 255, 0.6)',
                muted: 'rgba(255, 255, 255, 0.5)',
              }
            }
          }
        }
      }
    </script>
    <!-- Custom CSS -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
      * {
        font-family: 'Inter', sans-serif;
      }
      body {
        background: #080C14;
        color: #FFFFFF;
      }
      .gradient-bg {
        background: linear-gradient(135deg, #0A2540 0%, #0D1B2A 50%, #080C14 100%);
        min-height: 100vh;
      }
      .gradient-text {
        background: linear-gradient(135deg, #FFC107 0%, #10B981 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .glass-effect {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .glass-premium {
        background: rgba(13, 27, 42, 0.4);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .yellow-glow,
      button[class*="bg-primary"],
      button[class*="bg-brand-yellow"],
      a[class*="bg-primary"],
      a[class*="bg-brand-yellow"] {
        box-shadow: 0 0 20px rgba(255, 193, 7, 0.15), 0 10px 30px rgba(255, 193, 7, 0.12);
      }

      .yellow-glow:hover,
      button[class*="bg-primary"]:hover,
      button[class*="bg-brand-yellow"]:hover,
      a[class*="bg-primary"]:hover,
      a[class*="bg-brand-yellow"]:hover {
        box-shadow: 0 0 28px rgba(255, 193, 7, 0.24), 0 12px 35px rgba(255, 193, 7, 0.16);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
